<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="#1d5c3e"/>

  <!-- Subtle inner glow -->
  <rect width="200" height="200" rx="40" fill="url(#glow)" opacity="0.3"/>

  <!-- Open book / A-frame shape — two pages fanning open -->
  <path d="M40 148 L100 44 L160 148" stroke="#f07d24" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cross bar of the A — like an open book spine -->
  <path d="M58 118 L142 118" stroke="white" stroke-width="10" stroke-linecap="round"/>

  <!-- Left page of open book -->
  <path d="M100 44 C85 70 62 90 40 100" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.45"/>

  <!-- Right page of open book -->
  <path d="M100 44 C115 70 138 90 160 100" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.45"/>

  <!-- Orange dot — the knowledge spark / sun above -->
  <circle cx="100" cy="44" r="11" fill="#f07d24"/>
  <circle cx="100" cy="44" r="6" fill="#f5c842"/>

  <!-- Gradient definition -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
